<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verkeersinformatie Nederland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0e17;
    color: #ffffff;
    font-family: 'Outfit', 'DM Sans', system-ui, sans-serif;
    font-weight: 400;
  }

  .app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 36px 48px 40px;
  }

  /* ======= HEADER ======= */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 22px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 26px;
  }
  .header-left h1 {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .header-left .subtitle {
    margin-top: 10px;
    font-size: 16px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .stat {
    text-align: right;
  }
  .stat .value {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: #ffffff;
  }
  .stat .label {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 500;
  }
  .stat.red .value { color: #e74c3c; }
  .stat.orange .value { color: #f39c12; }

  /* ======= COLUMNS ======= */
  .columns {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    min-height: 0;
  }
  .column {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .column-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .column-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .column-title .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 12px;
    vertical-align: middle;
    transform: translateY(-2px);
  }
  .column.files .dot { background: #e74c3c; box-shadow: 0 0 12px rgba(231,76,60,0.6); }
  .column.works .dot { background: #f39c12; box-shadow: 0 0 12px rgba(243,156,18,0.6); }
  .column-count {
    font-size: 16px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }

  .list {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ======= CARD ======= */
  .card {
    position: relative;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 18px 14px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }
  .card.file::before { background: #e74c3c; }
  .card.work::before { background: #f39c12; }

  .badge {
    flex-shrink: 0;
    min-width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #151b26;
    border: 2px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #f1c40f;
    letter-spacing: -0.5px;
    padding: 0 6px;
  }
  .card.work .badge { color: #ffffff; }

  .body {
    flex: 1;
    min-width: 0;
  }
  .route {
    font-size: 20px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .route .arrow {
    color: rgba(255,255,255,0.35);
    margin: 0 8px;
    font-weight: 400;
  }
  .meta {
    margin-top: 6px;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .meta .reason {
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }
  .meta .sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .right-stat {
    flex-shrink: 0;
    text-align: right;
    min-width: 90px;
  }
  .right-stat .big {
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    color: #e74c3c;
  }
  .right-stat .unit {
    margin-top: 2px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 500;
  }
  .card.work .right-stat .big {
    font-size: 18px;
    color: #f39c12;
    font-weight: 600;
  }
  .card.work .right-stat .unit { text-transform: none; letter-spacing: 0; }

  /* ======= EMPTY ======= */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.55);
    gap: 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    padding: 40px;
  }
  .empty .check {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(46,204,113,0.15);
    border: 2px solid #2ecc71;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .empty .check svg {
    width: 38px;
    height: 38px;
    stroke: #2ecc71;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .empty .text {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
  }

  .loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
  }

  /* Timestamp */
  .update-time {
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>Verkeersinformatie Nederland</h1>
      <div class="subtitle">Laatst bijgewerkt: <span class="update-time" id="updateTime">—</span></div>
    </div>
    <div class="header-right">
      <div class="stat red">
        <div class="value" id="statFiles">—</div>
        <div class="label">Files</div>
      </div>
      <div class="stat">
        <div class="value" id="statKm">—</div>
        <div class="label">Km totaal</div>
      </div>
      <div class="stat orange">
        <div class="value" id="statWorks">—</div>
        <div class="label">Werkzaamheden</div>
      </div>
    </div>
  </div>

  <div class="columns">
    <div class="column files">
      <div class="column-header">
        <div class="column-title"><span class="dot"></span>Files</div>
        <div class="column-count" id="filesCount"></div>
      </div>
      <div class="list" id="filesList">
        <div class="loading">Gegevens ophalen…</div>
      </div>
    </div>

    <div class="column works">
      <div class="column-header">
        <div class="column-title"><span class="dot"></span>Wegwerkzaamheden</div>
        <div class="column-count" id="worksCount"></div>
      </div>
      <div class="list" id="worksList">
        <div class="loading">Gegevens ophalen…</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const FEED_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://www.anwb.nl/feeds/gethf');
  const MAX_ITEMS = 10;
  const REFRESH_MS = 5 * 60 * 1000;

  const elFilesList = document.getElementById('filesList');
  const elWorksList = document.getElementById('worksList');
  const elFilesCount = document.getElementById('filesCount');
  const elWorksCount = document.getElementById('worksCount');
  const elStatFiles = document.getElementById('statFiles');
  const elStatKm = document.getElementById('statKm');
  const elStatWorks = document.getElementById('statWorks');
  const elUpdate = document.getElementById('updateTime');

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function fmtTime(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString('nl-NL', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function fmtTimeShort(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return String(dateStr);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) {
      return d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('nl-NL', { day: '2-digit', month: '2-digit' }) +
           ' ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  }

  function renderEmptyFiles() {
    elFilesList.innerHTML = `
      <div class="empty">
        <div class="check">
          <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>
        </div>
        <div class="text">Geen files op dit moment</div>
      </div>`;
  }

  function renderEmptyWorks() {
    elWorksList.innerHTML = `
      <div class="empty">
        <div class="text">Geen werkzaamheden gepland</div>
      </div>`;
  }

  function renderError(msg) {
    const html = `<div class="loading">${escapeHtml(msg)}</div>`;
    elFilesList.innerHTML = html;
    elWorksList.innerHTML = html;
  }

  function renderFiles(files) {
    if (!files.length) { renderEmptyFiles(); return; }
    const items = files.slice(0, MAX_ITEMS).map(f => {
      const minutes = Math.round((f.delay || 0) / 60);
      const km = ((f.distance || 0) / 1000).toFixed(1);
      return `
        <div class="card file">
          <div class="badge">${escapeHtml(f.road || '')}</div>
          <div class="body">
            <div class="route">${escapeHtml(f.from || '')}<span class="arrow">→</span>${escapeHtml(f.to || '')}</div>
            <div class="meta">
              <span class="reason">${escapeHtml(f.reason || 'Onbekende oorzaak')}</span>
              <span class="sep"></span>
              <span>${km} km</span>
            </div>
          </div>
          <div class="right-stat">
            <div class="big">${minutes}</div>
            <div class="unit">min</div>
          </div>
        </div>`;
    }).join('');
    elFilesList.innerHTML = items;
  }

  function renderWorks(works) {
    if (!works.length) { renderEmptyWorks(); return; }
    const items = works.slice(0, MAX_ITEMS).map(w => {
      const start = fmtTimeShort(w.start);
      const stop = fmtTimeShort(w.stop);
      const period = (start || stop) ? `${start} – ${stop}` : '';
      return `
        <div class="card work">
          <div class="badge">${escapeHtml(w.road || '')}</div>
          <div class="body">
            <div class="route">${escapeHtml(w.from || '')}<span class="arrow">→</span>${escapeHtml(w.to || '')}</div>
            <div class="meta">
              <span class="reason">${escapeHtml(w.reason || 'Wegwerkzaamheden')}</span>
            </div>
          </div>
          <div class="right-stat">
            <div class="big">${escapeHtml(period)}</div>
          </div>
        </div>`;
    }).join('');
    elWorksList.innerHTML = items;
  }

  async function fetchData() {
    try {
      const res = await fetch(FEED_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const allFiles = [];
      const allWorks = [];
      const roadEntries = Array.isArray(data.roadEntries) ? data.roadEntries : [];

      roadEntries.forEach(entry => {
        const road = entry.road || '';
        const ev = entry.events || {};
        (ev.trafficJams || []).forEach(j => {
          allFiles.push({
            road,
            from: j.from,
            to: j.to,
            reason: j.reason,
            delay: j.delay || 0,
            distance: j.distance || 0
          });
        });
        (ev.roadWorks || []).forEach(w => {
          allWorks.push({
            road,
            from: w.from,
            to: w.to,
            reason: w.reason,
            start: w.start,
            stop: w.stop
          });
        });
      });

      allFiles.sort((a, b) => (b.delay || 0) - (a.delay || 0));

      const totalKm = allFiles.reduce((s, f) => s + (f.distance || 0), 0) / 1000;
      elStatFiles.textContent = allFiles.length;
      elStatKm.textContent = totalKm.toFixed(0);
      elStatWorks.textContent = allWorks.length;
      elFilesCount.textContent = allFiles.length > MAX_ITEMS ? `Top ${MAX_ITEMS} van ${allFiles.length}` : `${allFiles.length}`;
      elWorksCount.textContent = allWorks.length > MAX_ITEMS ? `Top ${MAX_ITEMS} van ${allWorks.length}` : `${allWorks.length}`;
      elUpdate.textContent = fmtTime(data.dateTime || new Date().toISOString());

      renderFiles(allFiles);
      renderWorks(allWorks);
    } catch (err) {
      console.error(err);
      renderError('Kan verkeersinformatie niet ophalen');
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);
})();
</script>
</body>
</html>
